<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注塑工艺优化系统 - 优化侧边栏版</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Vue 3 & Element Plus -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>

    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        
        /* Element Menu 深度定制 */
        .el-menu { 
            border-right: none !important; 
            background: transparent !important; 
        }
        
        /* 所有菜单项统一样式 */
        .el-menu-item,
        .el-sub-menu__title { 
            color: rgba(255,255,255,0.7) !important; 
            height: 48px !important; 
            line-height: 48px !important; 
            margin: 2px 12px !important; 
            border-radius: 8px !important; 
            padding: 0 16px !important;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
            position: relative;
            font-size: 14px !important;
            font-weight: 500 !important;
        }
        
        /* 确保菜单项内容居中对齐 */
        .el-menu-item > *,
        .el-sub-menu__title > * {
            display: flex;
            align-items: center;
        }
        
        /* 悬停效果 */
        .el-menu-item:hover,
        .el-sub-menu__title:hover { 
            background: rgba(255,255,255,0.08) !important; 
            color: #ffffff !important; 
        }
        
        /* 选中效果 */
        .el-menu-item.is-active { 
            background: rgba(59,130,246,0.2) !important; 
            color: #60a5fa !important; 
            font-weight: 600 !important;
        }
        
        /* 选中项左侧高亮条 */
        .el-menu-item.is-active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: #3b82f6;
            border-radius: 0 2px 2px 0;
        }
        
        /* 子菜单容器 */
        .el-sub-menu .el-menu {
            background: rgba(0,0,0,0.15) !important;
            margin: 0 12px 8px !important;
            border-radius: 8px !important;
            padding: 4px 0 !important;
        }
        
        /* 子菜单项 - 添加图标支持 */
        .el-sub-menu .el-menu-item {
            height: 40px !important;
            line-height: 40px !important;
            margin: 2px 8px !important;
            font-size: 13px !important;
            padding-left: 20px !important;
        }
        
        .el-sub-menu .el-menu-item i {
            margin-right: 8px;
            font-size: 12px;
            width: 16px;
            text-align: center;
            color: rgba(255,255,255,0.5);
        }
        
        .el-sub-menu .el-menu-item:hover {
            background: rgba(255,255,255,0.06) !important;
        }
        
        .el-sub-menu .el-menu-item:hover i {
            color: rgba(255,255,255,0.8);
        }
        
        .el-sub-menu .el-menu-item.is-active {
            background: rgba(59,130,246,0.15) !important;
            color: #60a5fa !important;
        }
        
        .el-sub-menu .el-menu-item.is-active i {
            color: #60a5fa;
        }
        
        /* ========== 折叠状态核心优化 ========== */
        .el-menu--collapse {
            width: 64px !important;
        }
        
        /* 折叠时一级菜单项居中 */
        .el-menu--collapse .el-menu-item,
        .el-menu--collapse .el-sub-menu__title {
            justify-content: center !important;
            padding: 0 !important;
            margin: 2px 8px !important;
            min-width: 48px !important;
        }
        
        /* 折叠时图标容器居中且无右边距 */
        .el-menu--collapse .menu-icon-wrapper {
            margin: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        /* 折叠时隐藏文字和箭头 */
        .el-menu--collapse .el-menu-item span,
        .el-menu--collapse .el-sub-menu__title span,
        .el-menu--collapse .el-sub-menu__icon-arrow {
            display: none !important;
        }
        
        /* 折叠时子菜单弹出层样式 - 增强版 */
        .el-menu--collapse .el-sub-menu__popper {
            background: #1e293b !important;
            border-radius: 8px !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            margin-left: 8px !important;
        }
        
        /* 弹出层箭头隐藏 */
        .el-menu--collapse .el-popper__arrow {
            display: none !important;
        }
        
        .el-menu--collapse .el-sub-menu .el-menu {
            background: transparent !important;
            padding: 8px 0 !important;
            min-width: 180px !important;
        }
        
        .el-menu--collapse .el-sub-menu .el-menu-item {
            padding: 0 16px !important;
            margin: 2px 8px !important;
            height: 40px !important;
            line-height: 40px !important;
            color: rgba(255,255,255,0.7) !important;
            justify-content: flex-start !important;
            border-radius: 6px !important;
        }
        
        .el-menu--collapse .el-sub-menu .el-menu-item i {
            margin-right: 10px;
            font-size: 13px;
            width: 18px;
            text-align: center;
        }
        
        .el-menu--collapse .el-sub-menu .el-menu-item span {
            display: inline-block !important;
            font-size: 13px;
            white-space: nowrap;
        }
        
        .el-menu--collapse .el-sub-menu .el-menu-item:hover {
            background: rgba(255,255,255,0.08) !important;
            color: #ffffff !important;
        }
        
        .el-menu--collapse .el-sub-menu .el-menu-item.is-active {
            background: rgba(59,130,246,0.2) !important;
            color: #60a5fa !important;
        }
        
        .el-menu--collapse .el-sub-menu .el-menu-item.is-active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: #3b82f6;
            border-radius: 0 2px 2px 0;
        }
        
        /* 图标容器样式 */
        .menu-icon-wrapper {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }
        
        .el-menu-item .menu-icon-wrapper,
        .el-sub-menu__title .menu-icon-wrapper {
            background: rgba(255,255,255,0.08);
        }
        
        .el-menu-item:hover .menu-icon-wrapper,
        .el-sub-menu__title:hover .menu-icon-wrapper {
            background: rgba(255,255,255,0.12);
        }
        
        .el-menu-item.is-active .menu-icon-wrapper {
            background: rgba(59,130,246,0.25);
        }
        
        /* Logo 区域 - 垂直布局 */
        .logo-area {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            padding: 24px 0;
            min-height: 100px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 折叠时 Logo 区域调整 */
        .sidebar-transition.w-20 .logo-area {
            padding: 20px 0;
            min-height: 80px;
        }
        
        /* 卡片悬停效果 */
        .hover-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.12); 
        }
        
        /* 侧边栏过渡 */
        .sidebar-transition {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="app" class="flex h-screen overflow-hidden">
        
        <!-- 1. 侧边栏 (Sidebar) - 优化版 -->

                <!-- 工艺管理 -->

                        </div>

                    <el-menu-item index="/process/record-list">
                        <i class="fa-solid fa-file-lines"></i>
                        <span>工艺记录</span>

                    <el-menu-item index="/process/create">

                <!-- 机器管理 -->

                        </div>

                    </template>
                    <el-menu-item index="/machine/list">
                        <i class="fa-solid fa-server"></i>
                        <span>机器列表</span>
                    </el-menu-item>

                        <span>新增机器</span>

                </el-sub-menu>

                <!-- 材料管理 -->

                    <template #title>

                            <i class="fa-solid fa-flask text-sm"></i>

                    </template>
                    <el-menu-item index="/polymer/list">

                        <span>材料列表</span>
                    </el-menu-item>
                    <el-menu-item index="/polymer/create">

                </el-sub-menu>
                
                <!-- 权限管理 -->

                                </div>
                            </template>
                            <el-table :data="recentActivities" style="width: 100%" :show-header="true" 
                                header-cell-class-name="!bg-slate-50 !text-slate-500 !font-semibold"
                                cell-class-name="!py-4"
                            >
                                <el-table-column prop="time" label="时间" width="180">
                                    <template #default="scope">
                                        <span class="text-slate-500 text-sm">{{ scope.row.time }}</span>
                                    </template>
                                </el-table-column>
                                <el-table-column prop="mold" label="模具编号">
                                    <template #default="scope">
                                        <span class="font-semibold text-blue-600 cursor-pointer hover:underline hover:text-blue-700">{{ scope.row.mold }}</span>
                                    </template>
                                </el-table-column>
                                <el-table-column prop="action" label="操作类型">
                                    <template #default="scope">
                                        <span class="text-slate-600">{{ scope.row.action }}</span>
                                    </template>
                                </el-table-column>
                                <el-table-column prop="status" label="状态" width="110">
                                    <template #default="scope">
                                        <el-tag :type="scope.row.statusType" size="small" effect="light" round class="!border-0">
                                            <i :class="getStatusIcon(scope.row.status)" class="mr-1.5"></i> {{ scope.row.status }}
                                        </el-tag>
                                    </template>
                                </el-table-column>
                            </el-table>
                        </el-card>

                        <!-- Right: Quick Actions & Status -->
                        <div class="space-y-6">
                            <!-- Quick Actions -->
                            <el-card class="border-0 rounded-xl shadow-sm bg-white">
                                <template #header>
                                    <span class="font-bold text-slate-700">
                                        <i class="fa-solid fa-bolt mr-2 text-amber-500"></i>快捷入口
                                    </span>
                                </template>
                                <div class="grid grid-cols-2 gap-3">
                                    <button @click="handleMenuSelect('/mold/create')" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition-all group border border-slate-100 hover:border-blue-200">
                                        <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center mb-2 group-hover:bg-blue-200 transition-colors">
                                            <i class="fa-solid fa-plus text-blue-600"></i>
                                        </div>
                                        <span class="text-sm font-medium text-slate-600 group-hover:text-blue-600">新增模具</span>
                                    </button>
                                    <button @click="handleMenuSelect('/process/create')" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-xl hover:bg-green-50 hover:text-green-600 transition-all group border border-slate-100 hover:border-green-200">
                                        <div class="w-10 h-10 rounded-lg bg-green-100 flex items-center justify-center mb-2 group-hover:bg-green-200 transition-colors">
                                            <i class="fa-solid fa-file-pen text-green-600"></i>
                                        </div>
                                        <span class="text-sm font-medium text-slate-600 group-hover:text-green-600">工艺录入</span>
                                    </button>
                                    <button @click="handleMenuSelect('/process/optimize')" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-xl hover:bg-orange-50 hover:text-orange-600 transition-all group border border-slate-100 hover:border-orange-200">
                                        <div class="w-10 h-10 rounded-lg bg-orange-100 flex items-center justify-center mb-2 group-hover:bg-orange-200 transition-colors">
                                            <i class="fa-solid fa-wand-magic-sparkles text-orange-600"></i>
                                        </div>
                                        <span class="text-sm font-medium text-slate-600 group-hover:text-orange-600">开始优化</span>
                                    </button>
                                    <button @click="handleMenuSelect('/machine/list')" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all group border border-slate-100 hover:border-indigo-200">
                                        <div class="w-10 h-10 rounded-lg bg-indigo-100 flex items-center justify-center mb-2 group-hover:bg-indigo-200 transition-colors">
                                            <i class="fa-solid fa-magnifying-glass text-indigo-600"></i>
                                        </div>
                                        <span class="text-sm font-medium text-slate-600 group-hover:text-indigo-600">查找机台</span>
                                    </button>
                                </div>
                            </el-card>

                            <!-- System Status -->
                            <el-card class="border-0 rounded-xl shadow-sm bg-white">
                                <template #header>
                                    <span class="font-bold text-slate-700">
                                        <i class="fa-solid fa-server mr-2 text-slate-400"></i>系统状态
                                    </span>
                                </template>
                                <div class="space-y-5">
                                    <div>
                                        <div class="flex justify-between text-sm mb-2">
                                            <span class="text-slate-500 font-medium">服务器负载</span>
                                            <span class="font-bold text-slate-700">45%</span>
                                        </div>
                                        <el-progress :percentage="45" :stroke-width="8" :show-text="false" color="#3b82f6" class="[&_.el-progress-bar__outer]:bg-slate-100"></el-progress>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-sm mb-2">
                                            <span class="text-slate-500 font-medium">数据库存储</span>
                                            <span class="font-bold text-slate-700">72%</span>
                                        </div>
                                        <el-progress :percentage="72" :stroke-width="8" :show-text="false" color="#10b981" class="[&_.el-progress-bar__outer]:bg-slate-100"></el-progress>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-sm mb-2">
                                            <span class="text-slate-500 font-medium">内存使用率</span>
                                            <span class="font-bold text-slate-700">58%</span>
                                        </div>
                                        <el-progress :percentage="58" :stroke-width="8" :show-text="false" color="#f59e0b" class="[&_.el-progress-bar__outer]:bg-slate-100"></el-progress>
                                    </div>
                                </div>
                            </el-card>
                        </div>

                    </div>
                </div>

                <!-- Placeholder for other pages -->
                <div v-else class="flex flex-col items-center justify-center h-[60vh] text-slate-400">
                    <div class="bg-white p-8 rounded-2xl shadow-sm mb-6">
                        <i class="fa-regular fa-folder-open text-5xl text-slate-300"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-600">{{ currentTitle }}</h3>
                    <p class="text-sm mt-2 text-slate-400">该模块正在开发中...</p>
                </div>

            </main>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        const app = createApp({
            setup() {
                const isCollapse = ref(false);
                const activeMenu = ref('/dashboard');

                const recentActivities = ref([
                    { time: '2024-01-15 10:30', mold: 'MOLD-2024-001', action: '参数自动优化', status: '成功', statusType: 'success' },
                    { time: '2024-01-15 09:15', mold: 'MOLD-2024-005', action: '工艺移植', status: '进行中', statusType: 'warning' },
                    { time: '2024-01-14 16:45', mold: 'MOLD-2024-002', action: '模流数据分析', status: '失败', statusType: 'danger' },
                    { time: '2024-01-14 14:20', mold: 'MOLD-2024-008', action: '新增模具录入', status: '成功', statusType: 'success' },
                    { time: '2024-01-13 11:00', mold: 'MOLD-2024-012', action: '机器适配检测', status: '成功', statusType: 'success' },
                ]);

                const getStatusIcon = (status) => {
                    if (status === '成功') return 'fa-solid fa-circle-check';
                    if (status === '失败') return 'fa-solid fa-circle-xmark';
                    return 'fa-solid fa-spinner fa-spin';
                };

                const toggleSidebar = () => {
                    isCollapse.value = !isCollapse.value;
                };

                const handleMenuSelect = (index) => {
                    activeMenu.value = index;
                };

                const currentTitle = computed(() => {
                    const map = {
                        '/dashboard': '工作台',
                        '/mold/list': '模具列表',
                        '/mold/create': '新增模具',
                        '/mold/data': '模流数据',
                        '/mold/adaptation': '注塑机适配',
                        '/process/record-list': '工艺记录',
                        '/process/create': '工艺录入',
                        '/process/transplant': '工艺移植',
                        '/process/optimize-list': '优化任务',
                        '/process/optimize': '工艺优化',
                        '/process/expert': '专家调优',
                        '/machine/list': '机器列表',
                        '/machine/create': '新增机器',
                        '/polymer/list': '材料列表',
                        '/polymer/create': '新增材料',
                        '/auth/org': '组织管理',
                        '/auth/role': '角色管理',
                        '/auth/user': '用户管理'
                    };
                    return map[activeMenu.value] || '详情页面';
                });

                return {
                    isCollapse,
                    activeMenu,
                    recentActivities,
                    getStatusIcon,
                    toggleSidebar,
                    handleMenuSelect,
                    currentTitle
                };
            }
        });

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
